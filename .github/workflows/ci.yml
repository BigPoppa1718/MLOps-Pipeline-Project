name: MLOps Automation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Code Verification & Testing
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Pinned Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Pre-build Mock Dataset for Validation Check
      run: |
        mkdir -p data
        python -c "import os; from src.data_preprocessing import generate_synthetic_data; from src.train import load_config; config = load_config(); df = generate_synthetic_data(config['data']['num_rows'], config['data']['random_seed']); df.to_csv('data/heart_disease.csv', index=False)"

    - name: Run Pytest Suite
      run: |
        pytest -v

  # JOB 2: Model Training & Performance Verification
  train-model:
    runs-on: ubuntu-latest
    needs: run-tests # This forces the training job to wait for the test job to pass cleanly
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Pinned Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Pre-build Mock Dataset for Execution
      run: |
        mkdir -p data
        python -c "import os; from src.data_preprocessing import generate_synthetic_data; from src.train import load_config; config = load_config(); df = generate_synthetic_data(config['data']['num_rows'], config['data']['random_seed']); df.to_csv('data/heart_disease.csv', index=False)"

    - name: Run Production Training Pipeline & Performance Gate
      run: |
        python -m src.train
